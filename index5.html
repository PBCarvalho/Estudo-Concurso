<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cronograma de Estudos — Ciclo Mensal</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #13161d;
    --card: #1a1e28;
    --border: #252a38;
    --accent: #f0c040;
    --accent2: #4fc3f7;
    --accent3: #a78bfa;
    --green: #4ade80;
    --red: #f87171;
    --text: #e8eaf0;
    --muted: #6b7280;
    --mono: 'Space Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 28px 40px 20px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    flex-wrap: wrap;
    gap: 12px;
    background: linear-gradient(180deg, #11141b 0%, transparent 100%);
  }
  header h1 {
    font-family: var(--sans);
    font-weight: 800;
    font-size: 1.6rem;
    letter-spacing: -0.5px;
    color: var(--text);
  }
  header h1 span { color: var(--accent); }
  header p { font-family: var(--mono); font-size: 0.7rem; color: var(--muted); }

  /* ── ADMIN UI ── */
  .admin-bar {
    padding: 8px 40px;
    background: #1e222d;
    display: flex;
    justify-content: flex-end;
    gap: 15px;
    align-items: center;
    border-bottom: 1px solid var(--border);
  }
  .login-btn {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 5px 15px;
    border-radius: 4px;
    font-family: var(--mono);
    font-size: 0.65rem;
    font-weight: 700;
    cursor: pointer;
  }
  .admin-only { display: none; }
  body.is-admin .admin-only { display: block; }
  body.is-admin .admin-flex { display: flex; }
  body:not(.is-admin) input, body:not(.is-admin) textarea, body:not(.is-admin) select { pointer-events: none; opacity: 0.7; }

  /* ── TABS ── */
  .tabs {
    display: flex;
    gap: 4px;
    padding: 20px 40px 0;
    border-bottom: 1px solid var(--border);
  }
  .tab-btn {
    font-family: var(--mono);
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 8px 20px;
    border: 1px solid transparent;
    border-bottom: none;
    border-radius: 6px 6px 0 0;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab-btn:hover { color: var(--text); background: var(--surface); }
  .tab-btn.active {
    background: var(--card);
    color: var(--accent);
    border-color: var(--border);
  }

  /* ── MAIN ── */
  main { padding: 32px 40px; max-width: 1300px; margin: 0 auto; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── SECTION TITLES ── */
  .section-title {
    font-family: var(--mono);
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── WEEK CARDS ── */
  .week-grid {
    display: grid;
    gap: 24px;
    margin-bottom: 40px;
  }

  .week-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .week-header {
    background: var(--surface);
    padding: 14px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
  }
  .week-label {
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--accent);
    font-weight: 700;
  }
  .week-progress-text {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--muted);
  }
  .week-progress-bar {
    height: 3px;
    background: var(--border);
  }
  .week-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.4s ease;
    border-radius: 2px;
  }

  /* ── DAYS TABLE ── */
  .days-table { width: 100%; }
  .day-row {
    display: grid;
    grid-template-columns: 110px 1fr 1fr 80px;
    align-items: center;
    padding: 0 20px;
    border-bottom: 1px solid var(--border);
    min-height: 48px;
    gap: 12px;
    transition: background 0.15s;
  }
  .day-row:last-child { border-bottom: none; }
  .day-row:hover { background: rgba(255,255,255,0.02); }
  .day-row.weekend { grid-template-columns: 110px 1fr 80px; }

  .day-name {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .day-name.sat { color: var(--accent2); }
  .day-name.sun { color: var(--accent3); }
  .day-name.completed { color: var(--green); }

  .session-block {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .session-label {
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--muted);
    white-space: nowrap;
  }
  .session-label.s1 { color: rgba(240,192,64,0.7); }
  .session-label.s2 { color: rgba(79,195,247,0.7); }
  .session-label.weekend-lbl { color: rgba(167,139,250,0.7); }

  /* ── CHECKBOX ── */
  .check-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
  }
  .check-wrap input[type="checkbox"] { display: none; }
  .custom-check {
    width: 20px;
    height: 20px;
    border: 1.5px solid var(--border);
    border-radius: 4px;
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
    cursor: pointer;
  }
  .custom-check::after {
    content: '';
    width: 10px;
    height: 7px;
    border-left: 2px solid transparent;
    border-bottom: 2px solid transparent;
    transform: rotate(-45deg) translateY(-1px);
    transition: all 0.15s;
  }
  input[type="checkbox"]:checked + .custom-check {
    background: var(--accent);
    border-color: var(--accent);
  }
  input[type="checkbox"]:checked + .custom-check::after {
    border-left-color: #000;
    border-bottom-color: #000;
  }

  .day-total {
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--muted);
    text-align: right;
  }
  .day-total .mins { color: var(--accent); font-weight: 700; }

  .day-row-head {
    display: grid;
    grid-template-columns: 110px 1fr 1fr 80px;
    padding: 8px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    gap: 12px;
  }
  .day-row-head.weekend { grid-template-columns: 110px 1fr 80px; }
  .col-head {
    font-family: var(--mono);
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* ── STATS ROW ── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
    margin-bottom: 40px;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
  }
  .stat-label {
    font-family: var(--mono);
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .stat-value {
    font-family: var(--mono);
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--text);
  }
  .stat-value span { font-size: 0.75rem; color: var(--muted); margin-left: 4px; }
  .stat-sub { font-family: var(--mono); font-size: 0.65rem; color: var(--muted); margin-top: 4px; }

  /* ── CHARTS ── */
  .charts-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin-bottom: 40px;
  }
  @media (max-width: 800px) { .charts-grid { grid-template-columns: 1fr; } }
  .chart-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }
  .chart-title {
    font-family: var(--mono);
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 18px;
  }
  canvas { width: 100% !important; }

  .extra-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 40px;
  }
  .extra-row {
    display: grid;
    grid-template-columns: 120px 180px 1fr 80px 40px;
    gap: 12px;
    align-items: center;
    margin-bottom: 10px;
  }
  .extra-row.head .col-head { font-family: var(--mono); font-size: 0.6rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
  input[type="date"], input[type="time"], input[type="number"], input[type="text"], select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.72rem;
    padding: 7px 10px;
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: var(--accent); }
  input[type="number"] { width: 70px; }
  .btn-add, .btn-remove {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 0.75rem;
    cursor: pointer;
    padding: 6px 10px;
    transition: all 0.2s;
  }
  .btn-add { color: var(--accent); border-color: var(--accent); padding: 8px 18px; }
  .btn-add:hover { background: var(--accent); color: #000; }
  .btn-remove:hover { background: var(--red); color: #fff; border-color: var(--red); }
  .extra-total {
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--accent);
    text-align: right;
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }

  textarea {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.75rem;
    padding: 14px;
    width: 100%;
    resize: vertical;
    outline: none;
    min-height: 90px;
    transition: border-color 0.2
