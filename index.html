<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cronograma PCBA — Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14; --surface: #13161d; --card: #1a1e28; --border: #252a38;
    --accent: #f0c040; --accent2: #4fc3f7; --accent3: #a78bfa;
    --green: #4ade80; --red: #f87171; --text: #e8eaf0; --muted: #6b7280;
    --mono: 'Space Mono', monospace; --sans: 'Syne', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }
  
  header { border-bottom: 1px solid var(--border); padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; background: #11141b; }
  .admin-badge { font-family: var(--mono); font-size: 0.6rem; padding: 4px 8px; border-radius: 4px; background: rgba(74, 222, 128, 0.1); color: var(--green); border: 1px solid var(--green); display: none; margin-left: 10px; }
  .login-trigger { cursor: pointer; opacity: 0.5; font-size: 1.2rem; transition: 0.3s; }
  .login-trigger:hover { opacity: 1; }

  .tabs { display: flex; gap: 4px; padding: 0 40px; border-bottom: 1px solid var(--border); background: var(--bg); }
  .tab-btn { font-family: var(--mono); font-size: 0.7rem; padding: 15px 20px; border: none; background: transparent; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  main { padding: 32px 40px; max-width: 1100px; margin: 0 auto; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .week-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 24px; }
  .week-header { padding: 15px 20px; background: var(--surface); display: flex; justify-content: space-between; font-family: var(--mono); font-size: 0.8rem; color: var(--accent); }
  .day-row { display: grid; grid-template-columns: 120px 1fr 1fr; padding: 12px 20px; border-bottom: 1px solid var(--border); align-items: center; }
  .day-name { font-family: var(--mono); font-size: 0.75rem; color: var(--muted); }
  
  .check-wrap { display: flex; align-items: center; gap: 10px; cursor: pointer; }
  .check-wrap input { display: none; }
  .custom-check { width: 18px; height: 18px; border: 2px solid var(--border); border-radius: 4px; transition: 0.2s; }
  input:checked + .custom-check { background: var(--accent); border-color: var(--accent); }
  input:disabled + .custom-check { opacity: 0.3; cursor: not-allowed; }

  .btn { font-family: var(--mono); padding: 10px 20px; border-radius: 6px; border: 1px solid var(--border); cursor: pointer; background: var(--surface); color: var(--text); font-size: 0.7rem; }
  .btn-accent { border-color: var(--accent); color: var(--accent); }
  
  textarea { width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 15px; border-radius: 8px; font-family: var(--mono); min-height: 200px; outline: none; }
  textarea:focus { border-color: var(--accent); }
  textarea[readonly] { cursor: default; color: var(--muted); }
</style>
</head>
<body>

<header>
  <div>
    <h1>Cronograma <span style="color:var(--accent)">PCBA</span> <span id="badge" class="admin-badge">EDITOR</span></h1>
  </div>
  <div id="auth-area">
    <span class="login-trigger" id="login-btn" title="Login Administrador">🔒</span>
  </div>
</header>

<nav class="tabs">
  <button class="tab-btn active" data-tab="semanas">Cronograma</button>
  <button class="tab-btn" data-tab="extras">Sessões Extras</button>
  <button class="tab-btn" data-tab="notas">Notas</button>
</nav>

<main>
  <div id="tab-semanas" class="tab-panel active">
    <div id="weeks-container">Carregando dados do banco...</div>
  </div>

  <div id="tab-extras" class="tab-panel">
    <div id="admin-extras-controls" style="margin-bottom: 20px; display: none;">
        <button class="btn btn-accent" id="add-extra-btn">+ Registrar Estudo Extra</button>
    </div>
    <div id="extras-list"></div>
  </div>

  <div id="tab-notas" class="tab-panel">
    <textarea id="notes-area" placeholder="Suas anotações de estudo aparecerão aqui..." readonly></textarea>
    <div id="admin-reset-area" style="margin-top: 30px; display: none; border-top: 1px solid var(--border); padding-top: 20px;">
        <p style="color:var(--muted); font-size: 0.7rem; margin-bottom: 10px;">Zona de Perigo:</p>
        <button class="btn" style="color:var(--red); border-color:var(--red)" id="reset-btn">Resetar Todo o Ciclo</button>
    </div>
  </div>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDlbOqwAQQgz8H9eWU77EgKb6kj3_tcLyQ",
  authDomain: "estudar-concursos.firebaseapp.com",
  databaseURL: "https://estudar-concursos-default-rtdb.firebaseio.com",
  projectId: "estudar-concursos",
  storageBucket: "estudar-concursos.firebasestorage.app",
  messagingSenderId: "265838316024",
  appId: "1:265838316024:web:e26fefa9352463a2df6e0d",
  measurementId: "G-SVVTX9KEEJ"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

// 🚨 IMPORTANTE: SUBSTITUA PELO SEU UID APÓS O PRIMEIRO LOGIN
const ADMIN_UID = "COLE_SEU_UID_AQUI"; 
const DOC_ID = "dados_estudo";

let state = { checks: {}, extras: [], notes: "" };
let isAdmin = false;

// Monitor de Autenticação
onAuthStateChanged(auth, (user) => {
  if (user && user.uid === ADMIN_UID) {
    isAdmin = true;
    document.getElementById('badge').style.display = 'inline-block';
    document.getElementById('login-btn').textContent = '🔓';
    document.getElementById('admin-extras-controls').style.display = 'block';
    document.getElementById('admin-reset-area').style.display = 'block';
    document.getElementById('notes-area').readOnly = false;
  } else {
    isAdmin = false;
    document.getElementById('notes-area').readOnly = true;
    if(user) console.log("Seu UID para copiar:", user.uid);
  }
  loadData();
});

// Funções de Persistência
async function loadData() {
  const snap = await getDoc(doc(db, "ciclos", DOC_ID));
  if (snap.exists()) state = snap.data();
  renderAll();
}

async function sync() {
  if (!isAdmin) return;
  await setDoc(doc(db, "ciclos", DOC_ID), state);
}

// Renderização da Interface
function renderAll() {
  renderWeeks();
  renderExtras();
  document.getElementById('notes-area').value = state.notes || "";
}

function renderWeeks() {
  const container = document.getElementById('weeks-container');
  container.innerHTML = "";
  const dias = ['Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado', 'Domingo'];

  for(let w=1; w<=4; w++) {
    const card = document.createElement('div');
    card.className = 'week-card';
    card.innerHTML = `<div class="week-header">SEMANA 0${w}</div>`;
    
    dias.forEach(dia => {
      const row = document.createElement('div');
      row.className = 'day-row';
      const k1 = `w${w}_${dia}_s1`, k2 = `w${w}_${dia}_s2`;
      
      row.innerHTML = `
        <span class="day-name">${dia}</span>
        <label class="check-wrap">
          <input type="checkbox" ${state.checks[k1]?'checked':''} ${!isAdmin?'disabled':''} data-key="${k1}">
          <div class="custom-check"></div> <span style="font-size:0.6rem">Sessão 1</span>
        </label>
        <label class="check-wrap">
          <input type="checkbox" ${state.checks[k2]?'checked':''} ${!isAdmin?'disabled':''} data-key="${k2}">
          <div class="custom-check"></div> <span style="font-size:0.6rem">Sessão 2</span>
        </label>
      `;
      card.appendChild(row);
    });
    container.appendChild(card);
  }

  container.querySelectorAll('input').forEach(i => {
    i.onchange = (e) => {
        state.checks[e.target.dataset.key] = e.target.checked;
        sync();
    };
  });
}

function renderExtras() {
    const list = document.getElementById('extras-list');
    list.innerHTML = (state.extras || []).map((ex, i) => `
        <div class="day-row" style="grid-template-columns: 1fr 100px 40px">
            <span class="day-name" style="color:var(--text)">${ex.materia}</span>
            <span class="day-name">${ex.tempo} min</span>
            ${isAdmin ? `<button class="remove-extra" data-idx="${i}" style="background:none; border:none; color:var(--red); cursor:pointer">✕</button>` : ''}
        </div>
    `).join('');

    list.querySelectorAll('.remove-extra').forEach(b => {
        b.onclick = () => {
            state.extras.splice(b.dataset.idx, 1);
            renderExtras();
            sync();
        };
    });
}

// Eventos Global
document.getElementById('login-btn').onclick = () => {
    signInWithPopup(auth, provider).catch(e => alert("Erro: " + e.message));
};

document.getElementById('add-extra-btn').onclick = () => {
    const m = prompt("Matéria/Assunto:");
    const t = prompt("Duração (minutos):");
    if(m && t) {
        state.extras.push({materia: m, tempo: t});
        renderExtras();
        sync();
    }
};

document.getElementById('notes-area').oninput = (e) => {
    state.notes = e.target.value;
    sync();
};

document.getElementById('reset-btn').onclick = () => {
    if(confirm("Limpar todo o progresso?")) {
        state.checks = {};
        state.extras = [];
        sync();
        renderAll();
    }
};

// Navegação
document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.onclick = (e) => {
        document.querySelectorAll('.tab-panel, .tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById('tab-' + e.target.dataset.tab).classList.add('active');
        e.target.classList.add('active');
    };
});

</script>
</body>
</html>
